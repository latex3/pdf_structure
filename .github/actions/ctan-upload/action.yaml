name: CTAN upload

inputs:
  filename:
    required: true
  dry-run:
    required: true
  uploader:
    required: true
  email:
    required: true
  version:
    required: false
    default: ${{ github.ref_name }}

runs:
  using: composite
  steps:
    - name: Send to CTAN
      uses: zauguin/ctan-upload@v0.1
      with:
        package-name: show-pdf-tags
        version: ${{ inputs.version }}
        author: "Marcel Krüger, David Carlisle, LaTeX Project Team"
        uploader: ${{ inputs.uploader }}
        email: ${{ inputs.email }}
        license: mit
        summary: "Extract PDF tags from tagged PDF files"
        ctan-path: /support/show-pdf-tags
        support: https://github.com/latex3/pdf_structure/issues
        update: false
        topic: pdf-feat,pdf-view
        description: |
          Extract PDF tags from tagged PDF files as tree structure and represent it as XML or console art.
        filename: ${{ inputs.filename }}
        dry-run: ${{ inputs.dry-run }}
        announcement-filename: ctan.ann
        note: |
          This is bug-fix reupload for the not yet processed initial upload (version v1.0), making it work better with TeX Live.
          Since updates are rejected for not yet existing packages I had to mark it as an initial upload again.
          Since the previous version was not processed yet I included the same announcement again. Of course I would prefer it
          to only be announced once if possible.
