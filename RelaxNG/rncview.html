<!DOCTYPE html>
<html>
 <head>
  <meta charset="UTF-8"/>
  <title>Relax NG display</title>
  <style>
   a:visited {color: darkblue}
   a         {color: darkblue}
   *:target  {background-color:beige}
  </style>
  </head>
  <body>
   <h1 id="title">rnc viewer</h1>
   
   <h2>Index</h2>
   <p id="index">
   </p>

   <h2>Schema</h2>
   
   <pre id="rnc">
   </pre>

   <script>
    let params = new URLSearchParams(document.location.search);
    let rncURL = params.get("rnc") || 'document-pdf-ua2';
     document.querySelector("#title").textContent=rncURL;
     rncURL=rncURL + ".rnc";
    const names={};
    function addlink(a,b,t) {
    if (names[t]==1) {
    return b + '<a href="#rnc_' + t + '">' +t +'</a>';
    } else {
    return a;
    }
    }
    function addanchor(a,n,e) {
    names[n]=1;
    return '<b id="rnc_' + n + '">' + n + '</b>' + e;
    }
        function relaxhl (s) {
        var s2=s.replaceAll(/(\n|^)([^'#\n]*)(#[^\n]*)/g,'$1$2\x3cspan style="color:brown">$3\x3c/span>');
        s2=s2.replaceAll(/([a-z0-9.A-Z-]+)(\s*=\s*[^"])/g,addanchor);
	s2=s2.replaceAll(/ id="rnc_(pattern|right|local|anyElement|bvar|m|h|[a-z_\-]*percentage|[a-z]+\.(attributes|content|type))"/g,'');
        s2=s2.replaceAll(/include *"([^"]*)"/g,'\x3cspan style="color:green">include\x3c/span> "\x3cspan style="color:red">$1\x3c/span>"');
	s2=s2.replaceAll(/([^>a-z0-9.A-Z-_])([a-z0-9.A-Z-]+)/g,addlink);
	
	Object.keys(names).sort().forEach((n) => {idxc = idxc + ' <a href="#rnc_' + n + '">' + n + '</a>';});
        return  s2;
    }

    const idx = document.querySelector("#index");
    const pre = document.querySelector("#rnc");
	let idxc="";

fetch(rncURL)
    .then( r => (r.ok ? r.text() :"no file"))
  .then( t => {
  const tt=relaxhl(t);
      idx.innerHTML=idxc;
      pre.innerHTML=tt;
  } )
   </script>
  </body>
</html>
